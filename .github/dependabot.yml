version: 2
updates:
  # JS/TS deps — weekly check, keep dev + production aligned
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automated
    versioning-strategy: increase-if-necessary
    groups:
      eslint:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      vite-toolchain:
        patterns:
          - "vite"
          - "vitest"
          - "@vitejs/*"

  # GitHub Actions versions — pin to specific commits via Renovate-style
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - ci
      - automated
