name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC — catch new CVEs in pinned deps
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  npm-audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high

  dependency-review:
    name: Dependency review (PRs only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  semgrep:
    name: Semgrep OSS
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          semgrep ci \
            --config=p/owasp-top-ten \
            --config=p/typescript \
            --config=p/react \
            --config=p/javascript \
            --config=p/jwt

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # gitleaks needs full history on push events to scan the diff
          # against the previous commit; on PRs the action handles depth
          # itself. fetch-depth: 0 covers both cases.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          # GITHUB_TOKEN is provided automatically; gitleaks uses it to
          # add a check-run annotation listing any leaks found.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
