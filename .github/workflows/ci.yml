name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # Node 22+ required: package.json scripts use `--configLoader native`
          # which depends on Node's native TS type-stripping (≥22.6).
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # Use `npm install` (not `npm ci`) — known npm bug where lockfiles
        # generated on Windows omit transitive deps of optional native
        # bindings like @rolldown/binding-wasm32-wasi (@emnapi/core etc).
        # `npm install` tolerates the drift and installs missing entries.
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test (with coverage — info-only gate, hard fail in Stage B)
        run: npm run test:coverage
        continue-on-error: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Build
        run: npm run build

      - name: Upload bundle stats
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats
          path: dist/stats.html
          retention-days: 30

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install --no-audit --no-fund --prefer-offline
      - run: npm run sbom
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 90
