name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # Node 22+ required: package.json scripts use `--configLoader native`
          # which depends on Node's native TS type-stripping (≥22.6).
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # Use `npm install` (not `npm ci`) — known npm bug where lockfiles
        # generated on Windows omit transitive deps of optional native
        # bindings like @rolldown/binding-wasm32-wasi (@emnapi/core etc).
        # `npm install` tolerates the drift and installs missing entries.
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
